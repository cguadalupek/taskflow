services:
  mysql:
    image: mysql:8.0
    container_name: taskflow-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: taskflow_dev
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: taskflow-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_PORT: 3000
      APP_ENV: development
      DATABASE_URL: mysql://root:password@mysql:3306/taskflow_dev
      JWT_SECRET: your_jwt_secret_here
      JWT_EXPIRATION: 24h
      FRONTEND_URL: http://localhost:3001
      BCRYPT_SALT_ROUNDS: 10
    ports:
      - "3000:3000"
    command: >
      sh -c "npx prisma migrate deploy &&
      npm run prisma:seed &&
      npm run dev"

  frontend:
    build:
      context: ./frontend
    container_name: taskflow-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3000/api/v1
    ports:
      - "3001:3001"

volumes:
  mysql_data:
